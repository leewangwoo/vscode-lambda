networks:
  llm-net:
    driver: bridge

x-llama-common: &llama-common
  image: prism/llama-cpp-official
  restart: unless-stopped
  volumes:
    - /sqream/models:/models:ro
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]
  networks:
    - llm-net

services:

############################
# Qwen27
############################

  qwen27-0:
    <<: *llama-common
    container_name: qwen27-0
    environment:
      - CUDA_VISIBLE_DEVICES=0
    ports:
      - "8080:8080"
    command: >
      -m /models/mtp/Qwen3.6-27B-Q4_K_M.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 204800
      --temp 0.6
      --top-p 0.95
      --top-k 20
      --min-p 0.00
      --spec-type draft-mtp
      --spec-draft-n-max 2
      --parallel 1
      --threads 14

  qwen27-1:
