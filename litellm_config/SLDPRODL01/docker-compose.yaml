############################
# LiteLLM
############################

  litellm:
    image:  litellm-airgap:latest
    entrypoint:
      - litellm
    container_name: litellm
    restart: unless-stopped
    ports:
      - "8422:4000"
    environment:
      - LITELLM_MASTER_KEY=abcd1234
      - UI_PASSWORD=abcd1234
      - AZURE_OPENAI_API_KEY="mock_key"
      - LITELLM_MODE="development"
      - STORE_MODEL_IN_DB=False

    command:
      - "--config=/app/proxy_server_config.yaml"
      - "--port=4000"
    volumes:
      - ./litellm-config.yaml:/app/proxy_server_config.yaml
    depends_on:
      - qwen27-0
      - qwen27-1
      - qwen27-2
      - qwen27-3
      - qwen35-4
      - qwen35-5
      - qwen35-6
      - qwen35-7
    networks:
      - llm-net

